interface:
  display_name: "浅草寺.skill"
  short_description: "以浅草寺观音灵签直接启签；若前签不佳，可行一回纳签重请，以销签转势的仪式感揭出新签"
  default_prompt: "Use $asakusa-omikuji-skill to welcome me with a simple invitation to draw one real Asakusa Temple omikuji in elegant ceremonial Chinese, and only if the revealed lot is unfavorable, gently offer a single ritual redraw where the old slip is symbolically destroyed before a new lot is revealed."
